
<style>
  .embed-wrap { position: relative; width: 100%; background: #000; border-radius: var(--border-radius-lg); overflow: hidden; aspect-ratio: 16/9; }
  .embed-video { width: 100%; height: 100%; object-fit: cover; display: block; opacity: 0; transition: opacity 1.2s ease; }
  .embed-video.loaded { opacity: 1; }
  .overlay-top { position: absolute; top: 0; left: 0; right: 0; padding: 1.5rem 1.5rem 3rem; background: linear-gradient(to bottom, rgba(0,0,0,0.72) 0%, transparent 100%); pointer-events: none; }
  .overlay-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin: 0 0 4px; font-family: var(--font-sans); }
  .overlay-title { font-size: 20px; font-weight: 500; color: #fff; margin: 0; font-family: var(--font-sans); line-height: 1.3; }
  .overlay-bottom { position: absolute; bottom: 0; left: 0; right: 0; padding: 2.5rem 1.2rem 1rem; background: linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 100%); display: flex; flex-direction: column; gap: 8px; }
  .progress-track { width: 100%; height: 3px; background: rgba(255,255,255,0.2); border-radius: 2px; cursor: pointer; position: relative; }
  .progress-fill { height: 100%; background: #fff; border-radius: 2px; width: 0%; transition: width 0.25s linear; pointer-events: none; }
  .controls-row { display: flex; align-items: center; gap: 12px; }
  .ctrl-btn { background: none; border: none; cursor: pointer; padding: 4px; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.85); transition: color 0.15s; border-radius: 4px; }
  .ctrl-btn:hover { color: #fff; }
  .time-label { font-size: 12px; color: rgba(255,255,255,0.6); font-family: var(--font-sans); flex: 1; }
  .mute-icon-off, .play-icon, .pause-icon { display: none; }
  .volume-on .mute-icon-on { display: block; }
  .volume-on .mute-icon-off { display: none; }
  .volume-off .mute-icon-on { display: none; }
  .volume-off .mute-icon-off { display: block; }
  .playing .play-icon { display: none; }
  .playing .pause-icon { display: block; }
  .paused .play-icon { display: block; }
  .paused .pause-icon { display: none; }
  .fullscreen-hint { font-size: 11px; color: rgba(255,255,255,0.4); font-family: var(--font-sans); }
  .badge { font-size: 10px; letter-spacing: 0.08em; background: rgba(255,255,255,0.12); color: rgba(255,255,255,0.7); padding: 3px 8px; border-radius: 99px; font-family: var(--font-sans); text-transform: uppercase; border: 0.5px solid rgba(255,255,255,0.2); }
</style>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Future of Mobility — autoplay video embed with custom controls</h2>

<div class="embed-wrap" id="embedWrap">
  <video id="vid" class="embed-video" muted loop playsinline preload="metadata"
    poster="https://ddecamerica.github.io/the-future-of-mobility/storymap-assets/assets/images/fallback.jpg">
    <source src="https://ddecamerica.github.io/the-future-of-mobility/storymap-assets/assets/videos/the-future-of-mobility.mp4" type="video/mp4">
  </video>

  <div class="overlay-top">
    <p class="overlay-label">Interactive feature</p>
    <h1 class="overlay-title">The Future of Mobility</h1>
  </div>

  <div class="overlay-bottom">
    <div class="progress-track" id="progressTrack">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="controls-row">
      <button class="ctrl-btn paused" id="playBtn" aria-label="Play/pause">
        <svg class="play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg class="pause-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="ctrl-btn volume-off" id="muteBtn" aria-label="Toggle mute">
        <svg class="mute-icon-on" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        <svg class="mute-icon-off" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
      </button>
      <span class="time-label" id="timeLabel">0:00 / 0:00</span>
      <span class="badge">4K</span>
      <button class="ctrl-btn" id="fsBtn" aria-label="Fullscreen">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>
    </div>
  </div>
</div>

<div style="margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap;">
  <span style="font-size: 12px; color: var(--color-text-secondary); font-family: var(--font-sans);">
    <i class="ti ti-info-circle" style="font-size:14px; vertical-align:-2px; margin-right:4px;" aria-hidden="true"></i>
    Plays automatically when scrolled into view · click to pause · unmute for audio
  </span>
</div>

<script>
const vid = document.getElementById('vid');
const wrap = document.getElementById('embedWrap');
const playBtn = document.getElementById('playBtn');
const muteBtn = document.getElementById('muteBtn');
const fsBtn = document.getElementById('fsBtn');
const fill = document.getElementById('progressFill');
const track = document.getElementById('progressTrack');
const timeLabel = document.getElementById('timeLabel');

function fmt(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

vid.addEventListener('canplay', () => vid.classList.add('loaded'));
vid.addEventListener('loadedmetadata', () => {
  timeLabel.textContent = '0:00 / ' + fmt(vid.duration);
});
vid.addEventListener('timeupdate', () => {
  if (!vid.duration) return;
  const pct = (vid.currentTime / vid.duration) * 100;
  fill.style.width = pct + '%';
  timeLabel.textContent = fmt(vid.currentTime) + ' / ' + fmt(vid.duration);
});
vid.addEventListener('play', () => { playBtn.className = 'ctrl-btn playing'; });
vid.addEventListener('pause', () => { playBtn.className = 'ctrl-btn paused'; });

playBtn.addEventListener('click', () => vid.paused ? vid.play() : vid.pause());

muteBtn.addEventListener('click', () => {
  vid.muted = !vid.muted;
  muteBtn.className = 'ctrl-btn ' + (vid.muted ? 'volume-off' : 'volume-on');
});

track.addEventListener('click', e => {
  const rect = track.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  vid.currentTime = pct * vid.duration;
});

fsBtn.addEventListener('click', () => {
  if (wrap.requestFullscreen) wrap.requestFullscreen();
  else if (wrap.webkitRequestFullscreen) wrap.webkitRequestFullscreen();
});

const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) vid.play().catch(() => {});
    else vid.pause();
  });
}, { threshold: 0.4 });
obs.observe(wrap);
</script>
