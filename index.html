<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Future of Mobility</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ✅ FIX 1: both html AND body must have overflow hidden + zero size */
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
  }

  /* ✅ FIX 2: use position absolute + inset instead of aspect-ratio
     aspect-ratio on a block child makes the document taller than 100vh */
  .wrap {
    position: absolute;
    inset: 0;
    background: #000;
  }

  video {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 1.2s ease;
  }
  video.ready { opacity: 1; }

  .overlay-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    padding: 1.4rem 1.4rem 3.5rem;
    background: linear-gradient(to bottom, rgba(0,0,0,0.68) 0%, transparent 100%);
    pointer-events: none;
  }
  .overlay-top p {
    font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
    color: rgba(255,255,255,.5); margin: 0 0 4px;
    font-family: system-ui, sans-serif;
  }
  .overlay-top h1 {
    font-size: 22px; font-weight: 500; color: #fff; margin: 0;
    font-family: system-ui, sans-serif; line-height: 1.3;
  }

  .overlay-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 3rem 1.2rem 1rem;
    background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, transparent 100%);
    display: flex; flex-direction: column; gap: 8px;
  }

  .progress-track {
    width: 100%; height: 3px;
    background: rgba(255,255,255,.22);
    border-radius: 2px; cursor: pointer;
  }
  .progress-fill {
    height: 100%; background: #fff;
    border-radius: 2px; width: 0%;
    pointer-events: none;
    transition: width .25s linear;
  }

  .controls {
    display: flex; align-items: center; gap: 12px;
    font-family: system-ui, sans-serif;
  }
  .ctrl {
    background: none; border: none; cursor: pointer; padding: 4px;
    color: rgba(255,255,255,.85); display: flex; align-items: center;
    border-radius: 4px;
  }
  .ctrl:hover { color: #fff; }
  .time { font-size: 12px; color: rgba(255,255,255,.55); flex: 1; }
  .badge {
    font-size: 10px; letter-spacing: .07em;
    background: rgba(255,255,255,.1); color: rgba(255,255,255,.6);
    padding: 3px 8px; border-radius: 99px;
    border: .5px solid rgba(255,255,255,.2);
  }
</style>
</head>
<body>

<div class="wrap">
  <video id="vid" muted loop playsinline
    poster="https://ddecamerica.github.io/the-future-of-mobility/storymap-assets/assets/images/fallback.jpg">
    <source src="https://ddecamerica.github.io/the-future-of-mobility/storymap-assets/assets/videos/the-future-of-mobility.mp4" type="video/mp4">
  </video>

  <div class="overlay-top">
    <p>Interactive feature</p>
    <h1>The Future of Mobility</h1>
  </div>

  <div class="overlay-bottom">
    <!-- Add above the progress-track div -->
    <div id="hint" style="font-size:11px; color:rgba(255,255,255,.45); text-align:center; font-family:system-ui,sans-serif; padding-bottom:2px; pointer-events:none;">
    Click to activate · double-click video to pause
    </div>
    <div class="progress-track" id="track">
      <div class="progress-fill" id="fill"></div>
    </div>
    <div class="controls">
      <button class="ctrl" id="playBtn" aria-label="Play or pause">
        <svg id="iconPlay" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg id="iconPause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="ctrl" id="muteBtn" aria-label="Toggle mute">
        <svg id="iconMuteOff" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
        <svg id="iconMuteOn" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </button>
      <span class="time" id="time">0:00 / 0:00</span>
      <span class="badge">4K</span>
      <button class="ctrl" id="fsBtn" aria-label="Fullscreen">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Replace the existing <script> block with this -->
<script>
  const vid = document.getElementById('vid');
  const fill = document.getElementById('fill');
  const track = document.getElementById('track');
  const timeEl = document.getElementById('time');
  const playBtn = document.getElementById('playBtn');
  const muteBtn = document.getElementById('muteBtn');
  const fsBtn = document.getElementById('fsBtn');
  const wrap = document.querySelector('.wrap');

  function fmt(s) {
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return m + ':' + (sec < 10 ? '0' : '') + sec;
  }

  vid.addEventListener('canplay', () => vid.classList.add('ready'));
  vid.addEventListener('loadedmetadata', () => {
    timeEl.textContent = '0:00 / ' + fmt(vid.duration);
  });
  vid.addEventListener('timeupdate', () => {
    if (!vid.duration) return;
    fill.style.width = (vid.currentTime / vid.duration * 100) + '%';
    timeEl.textContent = fmt(vid.currentTime) + ' / ' + fmt(vid.duration);
  });
  vid.addEventListener('play', () => {
    document.getElementById('iconPlay').style.display = 'none';
    document.getElementById('iconPause').style.display = 'block';
  });
  vid.addEventListener('pause', () => {
    document.getElementById('iconPlay').style.display = 'block';
    document.getElementById('iconPause').style.display = 'none';
  });

  // FIX: double-click on video to toggle pause (bypasses StoryMap interaction lock)
  vid.addEventListener('dblclick', () => vid.paused ? vid.play() : vid.pause());

  playBtn.addEventListener('click', () => vid.paused ? vid.play() : vid.pause());

  muteBtn.addEventListener('click', () => {
    vid.muted = !vid.muted;
    document.getElementById('iconMuteOff').style.display = vid.muted ? 'block' : 'none';
    document.getElementById('iconMuteOn').style.display = vid.muted ? 'none' : 'block';
  });

  track.addEventListener('click', e => {
    const r = track.getBoundingClientRect();
    vid.currentTime = ((e.clientX - r.left) / r.width) * vid.duration;
  });

  // FIX: fullscreen on the whole document so Esc works natively,
  // and re-activate interaction after fullscreen exits
  fsBtn.addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
    } else {
      document.exitFullscreen().catch(() => {});
    }
  });

  // FIX: update fullscreen icon and re-focus iframe after exit
  document.addEventListener('fullscreenchange', () => {
    const inFS = !!document.fullscreenElement;
    fsBtn.querySelector('svg').innerHTML = inFS
      ? '<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>'
      : '<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
  });

    // Add inside the <script>, after the other event listeners
    document.addEventListener('click', () => {
    const hint = document.getElementById('hint');
    if (hint) hint.style.display = 'none';
    }, { once: true });

  // Intersection Observer — auto play/pause on scroll
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => e.isIntersecting ? vid.play().catch(() => {}) : vid.pause());
  }, { threshold: 0.4 });
  obs.observe(wrap);
</script>
</body>
</html>
